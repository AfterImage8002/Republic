 #이벤트

 #추가적
 additional_politic.1.t:0 "파시스트 결집"
 additional_politic.1.d:0 "많은 지지층들이 [THIS.GetFascistParty] 세력을 떠나가자, 전국의 파시스트들은 서로간의 세부적인 방법론 간의 논쟁을 멈추고, 다시금 이 나라에서 그들의 영향력을 잃어버리지 않게 대규모 집회를 개최하며 이를 선전하기 시작했습니다."
 additional_politic.1.a:0 "이것이 그들의 마지막 발악인가?"
 additional_politic.1.b:0 "우리도 이것에 맞서야 한다."
 additional_politic.2.t:0 "권위주의자 결집"
 additional_politic.2.d:0 "많은 지지층들이 [THIS.GetNeutralParty] 세력을 떠나가자, 전국의 권위주의자들은 서로간의 세부적인 방법론 간의 논쟁을 멈추고, 다시금 이 나라에서 그들의 영향력을 잃어버리지 않게 대규모 집회를 개최하며 이를 선전하기 시작했습니다."
 additional_politic.2.a:0 "이것이 그들의 마지막 발악인가?"
 additional_politic.2.b:0 "우리도 이것에 맞서야 한다."
 additional_politic.3.t:0 "보수주의자 집회"
 additional_politic.3.d:0 "많은 지지층들이 보수주의 세력을 떠나가자, 전국의 보수주의자들은 서로간의 세부적인 방법론 간의 논쟁을 멈추고, 다시금 이 나라에서 그들의 영향력을 잃어버리지 않게 대규모 집회를 개최하며 이를 선전하기 시작했습니다."
 additional_politic.4.t:0 "진보주의자 집회"
 additional_politic.4.d:0 "많은 지지층들이 진보주의 세력을 떠나가자, 전국의 진보주의자들은 서로간의 세부적인 방법론 간의 논쟁을 멈추고, 다시금 이 나라에서 그들의 영향력을 잃어버리지 않게 대규모 집회를 개최하며 이를 선전하기 시작했습니다."
 additional_politic.5.t:0 "사회주의자 대회"
 additional_politic.5.d:0 "많은 지지층들이 사회주의 세력을 떠나가자, 전국의 사회주의자들은 서로간의 세부적인 방법론 간의 논쟁을 멈추고, 다시금 이 나라에서 그들의 영향력을 잃어버리지 않게 대규모 집회를 개최하며 이를 선전하기 시작했습니다."
 additional_politic.6.t:0 "공산주의자 시위"
 additional_politic.6.d:0 "많은 지지층들이 [THIS.GetCommunistParty] 세력을 떠나가자, 전국의 공산주의자들은 서로간의 세부적인 방법론 간의 논쟁을 멈추고, 다시금 이 나라에서 그들의 영향력을 잃어버리지 않게 대규모 집회를 개최하며 이를 선전하기 시작했습니다."
 
 #일본
 jap.1.t:0 "자영업자 불안"
 jap.1.d:0 "긴축정책이 시행되지 않자, 가장 많은 피해를 입는 것은 자영업자들이었습니다. 지금은 초기적인 피해만이 확인되고 있지만, 이것이 거대한 눈덩이로 굴려질 지도 모릅니다."
 jap.1.a:0 "제길!"
 jap.2.t:0 "중단된 연설"
 jap.2.d:0 "2차례의 성공적인 연설을 뒤로, 나고야에서 3번째 연설이 진행되었지만, 거리에 나온 시위자들이 고성을 지르며 고의적으로 연설을 방해했습니다. 우리의 호소는 받아들여지지 않는 걸까요?"
 jap.2.a:0 "우리는 미움받고 있다..."
 jap.3.t:0 "조선총독의 거절"
 jap.3.d:0 "조선총독부는 현재 조선에서 일어나는 대규모 시위와 폭동, 그리고 파업으로 인한 자신들의 처절한 사정을 호소하며 제안을 거절했습니다. 조선총독에게 압박을 가할 필요가 있습니다."
 jap.3.a:0 "조선총독에게 압박을 가하라!"
 jap.4.t:0 "천황폐하의 답변"
 jap.4.d:0 ""계십니까?" \n\n"들어오게나"\n\n"폐하, 지난번에 제가 적어드린 편지에 대한 답변을 듣고자 이리 왔습니다."\n\n"..."\n\n이후 천황폐하께서는 애매모호한 답변만을 내놓으실 뿐이었습니다."
 jap.4.a:0 "이래선 아무런 소용이 없잖아!"
 jap.5.t:0 "등 돌린 신민"
 jap.5.d:0 "입헌민정당의 정치적 맹공세는 꽤나 성공적이었습니다. 입헌정우회는 의회에서의 영향력을 상당부분 상실했고, 우리 입헌민정당은 다시금 견고하게 '의회'에서 버티고 있습니다.\n\n그러나 신민들의 생각은 많이 달랐습니다. 입헌민정당의 부적절하고 맹목적인 정치 공세를 그들의 눈쌀을 찌뿌리게 만들 뿐이었습니다. 그들은 신민들에게서 지지를 잃고 말았습니다."
 jap.5.a:0 "완전히 궁지에 몰렸군."
 jap.7.t:0 "황도파 봉기"
 jap.7.d:0 "경제 정책의 실패, 만연한 부패, 문란해진 전통. 이것들이 모두 타락한 위정자들의 소행이며, 그 간신들이 천황폐하와 가까이 있다고 생각하는 용맹한 황도파 청년 장교들이, 수도 도쿄에서 쿠데타를 일으켰습니다.\n\n지금까지는 유혈사태가 보고되지 않았으나, 이러한 새로운 위기는 일본의 미래를 뒤바꿀 것임이 확실합니다."
 jap.7.a:0 "쇼와 유신 만세!"
 jap.7.b:0 "빠르게 진압해라!"
 jap.8.t:0 "일본의 미래"
 jap.9.t:0 "내지에서의 지원 요청"
 jap.9.d:0 "프랑화 위기로 악화되는 재정과 경제사정의 까닭으로, 내지는 우리에게 도움을 요청했습니다."
 jap.9.b:0 "어쩔 수 없는 일이다. 조선인들도 이해해주겠지."
 jap.9.a:0 "식민지 운영에 필요한 최소한의 자금도 없어!"
 jap.9_tt:0 "§L총독부는 생각보다 많이 부실합니다. 만약 내지를 지원하기 위해 식민정부 자산을 처분한다면, §R돌이킬 수 없는 소용돌이§!가 조선반도를 휘감을 것입니다.§!"
 jap.10.t:0 "도움의 손길"
 jap.11.t:0 "통제파 붕괴!"
 jap.11.d:0 "붕괴 직전의 황도파와 군국주의를 반대하던 여러 세력들에 의해 통제파는 의회에서 서서히 실각하며, 황도파가 그랬듯이 결국엔 무력을 쓰게 되었습니다, 종국에는 붕괴한다는 선택지까지 왔습니다, 흘리지 않은 피보다 더 진한 무언가가, 쌓이지 않은 시체보다 더 높은, 더 큰 무언가가 쌓여있지만, 일본은 광명의 길을 따라 나아갈 일밖에 더 남지 않았습니다."
 jap.11.a:0 "승리다!"
 jap.12.t:0 "쿠데타 - 하룻날"
 jap.12.d:0 "쿠데타 군들은 여러 육군 인사들을 만나며 자신들을 지지해줄 것을 요청했습니다. 그들이 황도파와 접선하는 것에 대하여 무언가 조치가 취해져야 합니다."
 jap.12.a:0 "육군 장교들에게 압력을 가하라."
 jap.12.a_tt:0 "§L이것은 그들의 궐기 위험도를 올릴 것입니다.§!"
 jap.12.b:0 "장교들을 통해 교섭을 시도할 수 있지 않을까?"
 jap.12.b_tt:0 "§L이것은 천황폐하의 결정에 영향을 줄 수 있습니다.§!"
 jap.13.t:0 "쿠데타 - 이튿날"
 jap.13.d:0 "주요 정치인 3명 주김"
 jap.13.a:0 "경찰력을 동원해서 그들을 예의주시하라!"
 jap.13.a_tt:0 "§L이것은 그들의 궐기 위험도를 올릴 것입니다.§!"
 jap.13.b:0 "장교들을 통한 교섭을 시도하라."
 jap.13.b_tt:0 "§L이것은 그들의 궐기 위험도를 낮출 것입니다.§!"
 jap.13.c:0 "천황폐하께 이 사실을 알리자!"
 jap.13.c_tt:0 "§L이것을 천황폐하의 결정에 영향을 줄 수 있습니다.§!"
 jap.14.t:0 "쿠데타 - 사흘날"
 jap.14.d:0 "그리고 쿠데타는 사흘날 아침을 맞았습니다."
 jap.14.a:0 "천황폐하께서 저들의 해산을 명령했다!"
 jap.14.b:0 "천황폐하께서 답신을 거부하셨다! 빠르게 행동하라!"
 jap.15.t:0 "일본의 운명"
 jap.15.d:0 "황도파는 전국에서의 지원을 호소하며, 중앙정부에 대항하는 '혁명'을 시작하였습니다."
 jap.15.a:0 "진압하라!"
 jap.15.a_tt:0 "경찰로부터 얻은 정보는 저들의 궐기에 유연하게 대응할 수 있도록 해줍니다."
 jap.17.t:0 "일본 군사쿠데타의 실패"
 jap.17.d:0 "내지에서 군사쿠데타가 일어나려는 조짐을 보였습니다만, 개미 한 마리도 사람에게 덤비지 않습니다, 이런 상황에서 사람이 사람에게 덤비진 않을 겁니다."
 jap.17.a:0 "황국은 건재하다!"
 jap.17.b:0 "일본은 보기보다 많은 문제를 가진 것으로 보인다."
 jap.18.t:0 "천황폐하와의 만남"
 jap.18.d:0 ""
 jap.18.a:0 "우린 할 수 있는 게 없다."
 jap.19.t:0 "봉기의 진압"
 jap.19.d:0 "ㅈㄱㄴ"
 jap.19.a:0 "해는 아직 밝게 빛난다."

 cho_col.1.t:0 "경성에서의 대규모 시위"
 cho_col.1.d:0 "ㅈㄱㄴ"
 cho_col.1.a:0 "그들과 대화를 시도하자."
 cho_col.1.b:0 "강경하게 대응하라!"
 cho_col.2.t:0 "대규모 노동자 파업"
 cho_col.2.d:0 "헌병을 동원하라! / 더 이상 투입할 헌병이 없습니다!"
 cho_col.2.a:0 "제길!"
 cho_col.3.t:0 "일본인 대지주와 자본가들의 항의"
 cho_col.3.d:0 "ㅈㄱㄴ"
 cho_col.3.a:0 "저들이 조선에서 철수하게 놔둘 수 없다!"
 cho_col.4.t:0 "의거"
 cho_col.4.d:0 "ㅈㄱㄴ"
 cho_col.4.a:0 "조선총독부가 무너졌다!"
 cho_col.5.t:0 "대규모 소작농 봉기"
 cho_col.5.d:0 "ㅈㄱㄴ"
 cho_col.5.a:0 "조선 독립 만세!"
 cho_col.5.b:0 "일망타진하라!"
 cho_col.6.t:0 "조선총독부를 향한 조직적인 폭탄 테러"
 cho_col.6.d:0 "ㅈㄱㄴ"
 cho_col.6.a:0 "동방을 밝게 비추는 태양은 이제 져가는가?"
 cho_col.6.b:0 "그럼에도 대일본제국은 아직 건재하다!"

 jap_k.1.t:0 "재벌의 통제파 지지"
 jap_k.1.d:0 "ㅈㄱㄴ"
 jap_k.1.a:0 "그들이 남기고 간 공장들을 활용하자."
 jap_k.2.t:0 "농민들의 지원"
 jap_k.2.d:0 "ㅈㄱㄴ"
 jap_k.2.a:0 "그들의 지원은 가치있다."
 jap_k.3.t:0 "황도파 궐기"
 jap_k.3.d:0 "ㅈㄱㄴ"
 jap_k.3.a:0 "존황토간!"
 jap_k.4.t:0 "궐기의 결과- 유신의 승리"
 jap_k.4.d:0 "ㅈㄱㄴ"
 jap_k.4.a:0 "유신 만세! 천황폐하 만세!"
 jap_k.5.t:0 "칭따오 점거?"
 jap_k.5.d:0 "ㅈㄱㄴ"
 jap_k.5.a:0 "우리의 영토를 되찾을 기회다!"
 jap_k.5.b:0 "그들을 자극하여 좋을 게 없다."
 jap_k.6.t:0 "다롄 점거?"
 jap_k.6.d:0 "ㅈㄱㄴ"
 jap_k.6.a:0 "우리의 영토를 되찾을 기회다!"
 jap_k.6.b:0 "그들을 자극하여 좋을 게 없다."
 jap_k.7.t:0 "칭다오를 점거한 중국군!"
 jap_k.7.d:0 "ㅈㄱㄴ"
 jap_k.7.a:0 "나중에 그 대가를 치뤄주마!"
 jap_k.8.t:0 "다롄을 점거한 중국군!"
 jap_k.8.d:0 "ㅈㄱㄴ"
 jap_k.9.t:0 "도호쿠 장교들의 지원"
 jap_k.9.d:0 "ㅈㄱㄴ"
 jap_k.9.a:0 "환영하오!"
 jap_k.10.t:0 "최후의 저항 - 간토 방어"
 jap_k.10.d:0 "ㅈㄱㄴ"
 jap_k.10.a:0 "모두, 방어태세를 취하라!"
 jap_k.11.t:0 "최후의 공세 - 간사이 진격"
 jap_k.11.d:0 "ㅈㄱㄴ"
 jap_k.11.a:0 "젠인, 스스메! (모두, 진격하라!)"
 jap_k.11_tt:0 "§R마지막 기회입니다§!. 본 공세가 실패한다면, 유신은 성공하지 못할 것입니다."
 jap_k.12.t:0 "궐기의 결과 - 유신의 패망"
 jap_k.12.d:0 "ㅈㄱㄴ"
 jap_k.12.a:0 "우리는 최선을 다했다..! 덴노 헤이카 반자이!"
 jap_k.12_tt:0 "§L황도파 장교들은 최후의 방어거점에서 집단 할복을 준비하고 있습니다...§!"
 jap_k.13.t:0 "반유신세력의 방어태세"
 jap_k.13.d:0 "ㅈㄱㄴ"
 jap_k.13.a:0 "그들의 마지막 발악일 뿐이다."

 FRA_event.1.t:0 "닭은 새벽속에서 울고"
 FRA_event.1.d:0 "'꼬끼오'\n\n 여느 때처럼 집 앞 마당서 닭이 6시를 알리며 울었다. 각 학자들과 문학인들이 가로되, 새 하루는 기뻐해야 할 일이라고 한다. 하루 3시간동안 7년을 걸으면 지구 한 바퀴를 돌 수 있다고도 하며 우리를 위로한다. 맞는 말일지도 모르겠지만 적어도 우리에겐 해당되지 않을 것이다. 우린 그 3시간도 걸을 시간도 없다. 벌써 우리 식구 여덟 명 중, 입 세 개가 줄었다. 저 금뱃지 양반들이 말하던 낙원은 어디갔나? 그들의 낙원이란 이런 것이었나? 그저 자신들의 호화스럽기만한 저택에서 칠면조나 뜯으며 편히 여생을 보내는 것이었나? \n\n 나는 아무것도 없는 텅빈 책상을 있는 힘껏 내리쳤다 \n\n "쾅" \n 책상이 요란한 소리를 내며 흔들렸다. \n "..." 책상에서 흘러나오는 요란한 소리가 끝나자 이내 정적이 거실을 감쌌다. 여느 때보다 고요했다. 분명 이 시간에는 가족들의 소리가 가득해야 할 텐데... \n\n "..." 나는 곧바로 어머니가 지어주신 옷으로 갈아입었다. 내가 성인 됐을 적에 지어주신 옷이다. 뒤이어 헤질 대로 헤진 바지와 베레모를 썼다. 왠진 모르겠지만 따뜻한 온기가 나를 감싼다. 분명 지금은 겨울인데 말이다. \n 그리고 나는 현관문의 손잡이를 잡아당겼다. '끼이익'하는 소리와 함께 마당에 키우는 닭과 병아리들이 나를 향해 울어댔다. 마치 내게 가지 말라는 듯. 괜스레 미안한 감정이 들었다. 이제 한낱 가축한테도 감정을 느끼다니 내가 정신이 나갔나 싶다. 뭐 그래도 상관 없을 것이다, 이제 아무것도 없으니 말이다. \n\n "탕!" \n\n 이제 아무것도 없을것이다. 그리고 앞으로도 그럴 것이다."
 FRA_event.1.a "그리고 태양은 떠올랐다."
 FRA_event.2.t:0 "보고"
 FRA_event.2.d:0 ""...전년대비 실업률은 57.6% 증가했으며 물가상승률또한 11.7% 증가, 그리고.. 시가총액이 67%감소했습니다." \n\n ".. 원인은" \n\n "그게... 저희도 잘 모릅니다" \n\n "... 잠깐 실례하겠네" \n\n "..네" \n\n "..." \n\n "이런 개씨발!" \n\n "그 빌어먹을 대전쟁이 끝나고 이제 좀 편하게 살 수 있나 했더지만 이게 뭔 상황이냐고!" \n\n "우리가 이겼잖아! 이겼는데 왜 또 지랄이냐고!" \n\n "장관님, 진정하시ㄱ" \n\n "니가 뭘 알아! 난 그 좆같은 똥통에서 4년이나 굴렀어, 거기서 뒤진 전우의 숫자도 이제 기억나지가 않아 내 전우들이 독일 개썅놈들한테 산채로 구워지는걸 내눈으로 똑똑히 보면서 4년동안 굴렀는데, 그렇게 죽을 고비를 넘기면서 국가를 위해 싸워서 이겼는데 왜 또 이지랄이냐고! 내가 이 국가한테 대체 뭘 더 해야 하는건데!" \n\n "..." \n\n "..." \n\n "... 오늘 오후 3시까지 경제부 임원들 다 집합시켜 이 좆같은 돈문제 좀 어떻게 해보게""
 FRA_event.2.a:0 ""..네 알겠습니다""
 FRA_event.3.t:0 "프랑화 문제 해결"
 FRA_event.3.d:0 "현재 수많은 문제점들이 우리의 공화국을 썩어문드러지게 하고있지만, 그중에서 가장 심각한 문제는 바로 프랑화 위기로 인한 경제 대공황 일 것입니다. 이때문에 우리 공화국의 국민들을 비롯한 전세계의 사람들이 심각한 경제위기와 빈곤을 겪고있습니다. 비록 늦었을지는 몰라도 우린 이 중대한 사안을 해결해 인류를 구원해야 할것입니다"
 FRA_event_3.a:0 "좋아 해보자고!"
 FRA_event_4.t:0 "토목사업 국유화"
 FRA_event.4.d:0 "우리의 선택이 옳았던 것일까요? 토목사업을 국유화하자 경제가 조금씩 살아나기 시작했습니다. 실업한 노동자들은 이제 국가의 주도아래 운하, 교량, 댐등을 건설해 처참해진 도시와 마을들에게 생기를 불어넣고있습니다. 이대로만 한다면 경제는 다시 활력을 되찾을 수 있을것입니다."
 FRA_event.4.a:0 "좋았어!"
 FRA_event.5.t:0 "노동자 임금 제공"
 FRA_event.5.d:0 ""오늘자 임금이오, 이제 집에 가도 좋소" \n\n "감사합니다! 오늘은 굶지 않아도 되겠어요! 정말 감사합니다!" \n\n 파리 시내 곳곳에서 임금이 든 돈 봉투를 들고 기뻐하는 시민과 노동자들이 늘어났습니다. 노동자의 정당한 임금을 국가에서 제공하기 시작한 직후 노동자들의 삶이 안정화 되기 시작한 것입니다. 비록 모든 노동자들이 그렇진 않지만 이런식으로만 한다면 곧 국가는 다시 안정될것입니다!"
 FRA_event.5.a:0 "좋았어!"
 FRA_event.6.t:0 "국고 부족"
 FRA_event.6.d:0 ""저.. 장관님 잠깐 들어가도 되겠습니까?" \n\n "들어오게" \n\n "다름이 아니라, 국고에 관련된 중대한 사항에 대해 말씀드리려 왔습니다" \n\n "알겠네, 설명해보게" \n\n "지난 두개의 정책 이후 국민들의 삶의 질은 확실히 좋아졌습니다, 하지만, 이제 그 정책들을 뒷받침할 국고가 부족해졌습니다." \n\n "... 알겠네 임원들이랑 얘기해보지 이만 들어가보게" \n\n "네 알겠습니다""
 FRA_event.6.a:0 "젠장할!"
 FRA_event.7.t:0 ""


 #슈퍼이벤트
