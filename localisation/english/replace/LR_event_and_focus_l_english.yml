 #추가적
 additional_politic.1.t:0 "파시스트 결집"
 additional_politic.1.d:0 "많은 지지층들이 [THIS.GetFascistParty] 세력을 떠나가자, 전국의 파시스트들은 서로간의 세부적인 방법론 간의 논쟁을 멈추고, 다시금 이 나라에서 그들의 영향력을 잃어버리지 않게 대규모 집회를 개최하며 이를 선전하기 시작했습니다."
 additional_politic.1.a:0 "이것이 그들의 마지막 발악인가?"
 additional_politic.1.b:0 "우리도 이것에 맞서야 한다."
 additional_politic.2.t:0 "권위주의자 결집"
 additional_politic.2.d:0 "많은 지지층들이 [THIS.GetNeutralParty] 세력을 떠나가자, 전국의 권위주의자들은 서로간의 세부적인 방법론 간의 논쟁을 멈추고, 다시금 이 나라에서 그들의 영향력을 잃어버리지 않게 대규모 집회를 개최하며 이를 선전하기 시작했습니다."
 additional_politic.2.a:0 "이것이 그들의 마지막 발악인가?"
 additional_politic.2.b:0 "우리도 이것에 맞서야 한다."
 additional_politic.3.t:0 "보수주의자 집회"
 additional_politic.3.d:0 "많은 지지층들이 보수주의 세력을 떠나가자, 전국의 보수주의자들은 서로간의 세부적인 방법론 간의 논쟁을 멈추고, 다시금 이 나라에서 그들의 영향력을 잃어버리지 않게 대규모 집회를 개최하며 이를 선전하기 시작했습니다."
 additional_politic.4.t:0 "진보주의자 집회"
 additional_politic.4.d:0 "많은 지지층들이 진보주의 세력을 떠나가자, 전국의 진보주의자들은 서로간의 세부적인 방법론 간의 논쟁을 멈추고, 다시금 이 나라에서 그들의 영향력을 잃어버리지 않게 대규모 집회를 개최하며 이를 선전하기 시작했습니다."
 additional_politic.5.t:0 "사회주의자 대회"
 additional_politic.5.d:0 "많은 지지층들이 사회주의 세력을 떠나가자, 전국의 사회주의자들은 서로간의 세부적인 방법론 간의 논쟁을 멈추고, 다시금 이 나라에서 그들의 영향력을 잃어버리지 않게 대규모 집회를 개최하며 이를 선전하기 시작했습니다."
 additional_politic.6.t:0 "공산주의자 시위"
 additional_politic.6.d:0 "많은 지지층들이 [THIS.GetCommunistParty] 세력을 떠나가자, 전국의 공산주의자들은 서로간의 세부적인 방법론 간의 논쟁을 멈추고, 다시금 이 나라에서 그들의 영향력을 잃어버리지 않게 대규모 집회를 개최하며 이를 선전하기 시작했습니다."
 
 #일본
 jap.1.t:0 "자영업자 불안"
 jap.1.d:0 "긴축정책이 시행되지 않자, 가장 많은 피해를 입는 것은 자영업자들이었습니다. 지금은 초기적인 피해만이 확인되고 있지만, 이것이 거대한 눈덩이로 굴려질 지도 모릅니다."
 jap.1.a:0 "제길!"
 jap.2.t:0 "중단된 연설"
 jap.2.d:0 "2차례의 성공적인 연설을 뒤로, 나고야에서 3번째 연설이 진행되었지만, 거리에 나온 시위자들이 고성을 지르며 고의적으로 연설을 방해했습니다. 우리의 호소는 받아들여지지 않는 걸까요?"
 jap.2.a:0 "우리는 미움받고 있다..."
 jap.3.t:0 "조선총독의 거절"
 jap.3.d:0 "조선총독부는 현재 조선에서 일어나는 대규모 시위와 폭동, 그리고 파업으로 인한 자신들의 처절한 사정을 호소하며 제안을 거절했습니다. 조선총독에게 압박을 가할 필요가 있습니다."
 jap.3.a:0 "조선총독에게 압박을 가하라!"
 jap.4.t:0 "천황폐하의 답변"
 jap.4.d:0 ""계십니까?" \n\n"들어오게나"\n\n"폐하, 지난번에 제가 적어드린 편지에 대한 답변을 듣고자 이리 왔습니다."\n\n"..."\n\n이후 천황폐하께서는 애매모호한 답변만을 내놓으실 뿐이었습니다."
 jap.4.a:0 "이래선 아무런 소용이 없잖아!"
 jap.5.t:0 "등 돌린 신민"
 jap.5.d:0 "입헌민정당의 정치적 맹공세는 꽤나 성공적이었습니다. 입헌정우회는 의회에서의 영향력을 상당부분 상실했고, 우리 입헌민정당은 다시금 견고하게 '의회'에서 버티고 있습니다.\n\n그러나 신민들의 생각은 많이 달랐습니다. 입헌민정당의 부적절하고 맹목적인 정치 공세를 그들의 눈쌀을 찌뿌리게 만들 뿐이었습니다. 그들은 신민들에게서 지지를 잃고 말았습니다."
 jap.5.a:0 "완전히 궁지에 몰렸군."
 jap.6.t:0 "천황폐하..?"
 jap.6.d:0 "입헌민정당이 군부의 통제권을 의회에 귀속시키는 법안을 발의하려고 할 때, 쇼와 덴노께서는 그들에게 '선을 넘지 말라'라며 조용히 경고하셨습니다."
 jap.6.a:0 "잠시 물러나 있자."
 jap.7.t:0 "황도파 봉기"
 jap.7.d:0 "ㅈㄱㄴ"
 jap.7.a:0 "쇼와 유신 만세!"
 jap.7.b:0 "빠르게 진압해라!"
 jap.8.t:0 "일본의 미래"

 #슈퍼이벤트
 super_event_asd:0 "한일전쟁"
 sp_event_asd_QUOTE:0 ""단순하게 살아라. 현대인은 쓸데없는 절차와 일 때문에 얼마나 복잡한 삶을 살아가는가?"\n-이드리스 샤흐"
 sp_event_asd_REMARK:0 "만세!"

 #중점
 JAP_focus_1:0 "위기 수습"
 JAP_focus_1_desc:0 "대공황 이후 또 다른 경제 위기에 직면한 우리는 긴축정책과 국가 주도의 토목사업을 진행하기에는 많은 무리가 있습니다. 그럼에도 일본 신민들을 위하는 우리 정치가들은 이 나라를 포기하지 않을 것입니다."
 JAP_focus_2:0 "신민에게 호소"
 JAP_focus_2_desc:0 "우선 신민들에게 우리를 지지해줄 것을 부탁해야 합니다. 그들의 지지없이는 그 어떤 행동도 할 수가 없습니다. 주요 도시에서의 연설은 그들의 지지를 이끌어낼 지도 모릅니다."
 JAP_focus_3:0 "식민지 활용"
 JAP_focus_3_desc:0 "당장 내지가 몰락하는 와중에 외지를 신경 쓸 필요는 없습니다. 우리는 조선과 대만에서의 물자 조달로 내지 신민의 후생을 증진시킬 것입니다."
 JAP_focus_4:0 "천황폐하 설득"
 JAP_focus_4_desc:0 "살아있는 신, 쇼와덴노께서의 지원이 있다면 우리에게는 커다란 정치적 명분이 주어집니다. 이것이 위기 상황을 타파하기에 더할 나위 없는 무기가 될 것입니다."
 JAP_focus_5:0 "정우회 비난"
 JAP_focus_5_desc:0 "의회 내 보수정당인 입헌정우회에서는 현 사태에 대한 수많은 비판을 우리에게 쏟아내고 있습니다. 이대로 맞기만 한다면, 다음 선거에서는 의사당에 발을 못 디딜 것입니다."
 JAP_focus_6:0 "군부 견제"
 JAP_focus_6_desc:0 "여전히 군부는 신민의 지지를 받고 있습니다. 그들의 적극적인 선전활동과 배후중상설의 확대가 그 원인인데, 우리는 이들이 우리에게 기어오르지 못하도록 상하관계를 확실히 해둘 필요가 있습니다."
 JAP_focus_7:0 "그래도 우리는 나아간다!"
 JAP_focus_7_desc:0 "밝은 미래로의 도약, 그 이상을 놓지 않는 것이 바로 실현할 수 있다는 증거입니다."
 SGE_focus_1:0 "혁명완수"
 SGE_focus_2:0 "피텔스바흐 왕조 청산"
 SGE_focus_3:0 "반혁명분자 처단"
 SGE_focus_4:0 "국경통제 강화"
 SGE_focus_5:0 "평의회 구성"
 SGE_focus_6:0 "첫번째 선거"